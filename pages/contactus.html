    <form action="http://primat.se/services/sendform.aspx?xid=form&xmail=test@123.com" method="post">
        <!-- Contact Information -->
        <div>
            <label for="name">Namn:</label>
            <input type="text" id="name" name="name"><br><br>
            <label for="adress">Adress:</label>
            <input type="text" id="adress" name="address"><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>
            <label for="phone">Telefon:</label>
            <input type="text" id="phone" name="phone"><br><br>
        </div>
        <!-- Customer Type -->
        <div>
            <input type="radio" id="type" name="type" value="customer">
            <label for="type">Privat</label>
            <input type="radio" id="type" name="type" value="employee">
            <label for="type">Företag</label><br><br>
        </div>
        <!-- Size of company -->
        <div>
            <input type="radio" id="size" name="size" value="private">
            <label for="size">---</label>
            <input type="radio" id="size" name="size" value="small">
            <label for="size">1-100 anställda</label>
            <input type="radio" id="size" name="size" value="medium">
            <label for="size">101-1000 anställda</label>
            <input type="radio" id="size" name="size" value="large">
            <label for="size">Mer än 1000 anställda</label><br><br>
            <label for="message">Meddelande:</label><br>
            <textarea id="message" name="message"></textarea><br><br>
        </div>
        <!--  Checkboxes-->
        <div>
            <input type="checkbox" name="newsletter" value="ja">
            <input type="hidden" name="newsletter" value="nej">
            <label for="newsletter"> Nyhetsbrev?</label><br>
            <input type="checkbox" name="returnPhone" value="ja">
            <input type="hidden" name="returnPhone" value="nej">
            <label for="returnPhone"> Vill du att vi ringer upp dig?</label><br>
        </div>
        <input class="submit-btn" type="submit" value="Skicka">
    </form>
